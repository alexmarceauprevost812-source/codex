<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codex Terminal — AL</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">⚡ Codex Terminal</div>
      <div class="header-right">
        <div class="model-badge">code-davinci-002</div>
        <button class="btn-vercel-header" onclick="toggleVercelPanel()">▲ Vercel</button>
      </div>
    </header>

    <!-- PANNEAU VERCEL -->
    <div class="vercel-panel" id="vercelPanel" style="display:none">
      <div class="vercel-panel-inner">
        <div class="vercel-title">▲ Déploiement Vercel</div>

        <div class="vercel-section">
          <label>Token Vercel
            <div class="input-row">
              <input type="password" id="vercelToken" placeholder="vercel_token_xxxx" />
              <button class="btn-sm" onclick="saveToken()">💾 Sauvegarder</button>
            </div>
          </label>
        </div>

        <div class="vercel-section">
          <label>Nom du projet
            <input type="text" id="projectName" placeholder="mon-projet-codex" />
          </label>
        </div>

        <div class="vercel-section">
          <label>Fichiers à déployer
            <div class="file-list" id="fileList">
              <div class="file-item">
                <input type="checkbox" id="f-html" checked />
                <label for="f-html">index.html</label>
              </div>
              <div class="file-item">
                <input type="checkbox" id="f-css" checked />
                <label for="f-css">style.css</label>
              </div>
              <div class="file-item">
                <input type="checkbox" id="f-js" checked />
                <label for="f-js">script.js</label>
              </div>
            </div>
          </label>
        </div>

        <div class="vercel-actions">
          <button class="btn-deploy" onclick="deployToVercel()">🚀 Déployer maintenant</button>
          <button class="btn-status" onclick="checkDeployStatus()">🔄 Vérifier statut</button>
          <button class="btn-open" id="btnOpenSite" onclick="openDeployedSite()" style="display:none">🌐 Ouvrir le site</button>
        </div>

        <div class="deploy-log" id="deployLog"></div>
      </div>
    </div>

    <div class="chat-container" id="chatContainer">
      <div class="welcome-msg">
        <span class="icon">🤖</span>
        <p>Salut! Envoie ton code ou ta question — je réponds via <strong>OpenAI Codex</strong>.<br/>
        Clique sur <strong>▲ Vercel</strong> pour déployer direct!</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="userInput"
          placeholder="Écris ton code ou ta question ici..."
          rows="3"
          onkeydown="handleKeyDown(event)"
        ></textarea>
        <div class="input-controls">
          <div class="options">
            <label>Tokens max :
              <input type="number" id="maxTokens" value="512" min="64" max="4096" step="64" />
            </label>
            <label>Température :
              <input type="number" id="temperature" value="0.2" min="0" max="1" step="0.1" />
            </label>
          </div>
          <div class="btn-group">
            <button class="btn-codex" id="sendBtn" onclick="sendToCodex()">Envoyer ▶</button>
            <button class="btn-deploy-quick" onclick="quickDeploy()">▲ Deploy</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
