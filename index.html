    }

      color: rgba(0,255,65,0.2);

    .submit-btn {
      width: 100%;
      padding: 1rem;

      border-radius: 4px;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      text-shadow: 0 0 8px #00ff41;

      overflow: hidden;
      margin-top: 0.5rem;
    }

    .submit-btn::before {
      content:'';
      position: absolute;

    }

      transform: translateY(0);
    }

    .submit-btn.loading {

      content: '...';
      animation: dots 1s infinite;
    }

      0%   { content: '.'; }

    }

    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: rgba(0,255,65,0.35);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      transition: color 0.3s;
    }

    .scanlines {

    .pw-strength {
      height: 3px;

      background: rgba(0,255,65,0.1);
      transition: all 0.3s ease;
    }

    .pw-strength-bar {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: all 0.4s ease;
    }
  </style>
</head>
