<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TI-LEX-AL Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══ BARRE DU HAUT ═══ -->
  <header class="topbar">
    <button class="menu-toggle" id="menuToggle">☰</button>

    <div class="api-wrapper" id="apiWrapper">
      <div class="api-field" id="apiField">
        <span class="api-icon">🔑</span>
        <input
          type="password"
          id="apiKeyInput"
          class="api-input"
          placeholder="Clé API Anthropic  sk-ant-..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="api-toggle-visibility" id="apiToggleVisibility" title="Voir/Cacher">👁️</button>
        <button class="api-save-btn" id="apiSaveBtn">Connecter</button>
      </div>
      <div class="api-status" id="apiStatus"></div>
    </div>
  </header>

  <!-- MENU LATÉRAL GAUCHE -->
  <aside class="sidebar" id="sidebar">
    <h2>💬 Discussions</h2>
    <ul class="discussion-list">
      <li class="discussion-item active">🗨️ Conversation 1</li>
      <li class="discussion-item">🗨️ Conversation 2</li>
      <li class="discussion-item">🗨️ Conversation 3</li>
      <li class="discussion-item">🗨️ Conversation 4</li>
      <li class="discussion-item">🗨️ Conversation 5</li>
    </ul>
    <button class="new-chat-btn">＋ Nouvelle discussion</button>
  </aside>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay"></div>

  <!-- ZONE PRINCIPALE -->
  <main class="main-content" id="mainContent">

    <!-- ZONE DES MESSAGES -->
    <div class="chat-window" id="chatWindow">
      <div class="message bot">
        <span>Salut! Chu TI-LEX-AL. Entre ta clé API Anthropic en haut pis on commence! 🍁</span>
      </div>
    </div>

    <!-- BULLE DE CHAT EN BAS -->
    <div class="chat-bar">
      <div class="attach-wrapper" id="attachWrapper">
        <button class="attach-btn" id="attachBtn" title="Ajouter une pièce jointe">＋</button>
        <div class="attach-menu" id="attachMenu">
          <label class="attach-item">
            📄 Fichier
            <input type="file" id="inputFichier" accept="*/*" hidden />
          </label>
          <label class="attach-item">
            🗜️ ZIP
            <input type="file" id="inputZip" accept=".zip,.rar,.7z,.tar,.gz" hidden />
          </label>
          <label class="attach-item">
            🖼️ Image
            <input type="file" id="inputImage" accept="image/*" hidden />
          </label>
        </div>
      </div>

      <textarea
        class="chat-input"
        id="chatInput"
        placeholder="Entre ta clé API pour commencer..."
        rows="1"
        disabled
      ></textarea>
      <button class="send-btn" id="sendBtn" disabled>➤</button>
    </div>

    <div class="preview-bar" id="previewBar"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
