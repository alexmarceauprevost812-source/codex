<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TI-LEX-AL Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══ BARRE DU HAUT ═══ -->
  <header class="topbar">
    <button class="menu-toggle" id="menuToggle">☰</button>

    <div class="topbar-center">
      <span class="app-title">🍁 TI-LEX-AL</span>
    </div>

    <div class="topbar-right">
      <!-- HEURE -->
      <span class="clock" id="clock">00:00:00</span>

      <!-- BOUTON CLÉ API -->
      <div class="key-wrapper" id="keyWrapper">
        <button class="key-btn" id="keyBtn" title="Clé API Anthropic">
          🔑
          <span class="key-dot" id="keyDot"></span>
        </button>

        <!-- POPUP CLÉ API -->
        <div class="key-popup" id="keyPopup">
          <div class="key-popup-header">🤖 Clé API Anthropic</div>
          <div class="key-field" id="keyField">
            <input
              type="password"
              id="apiKeyInput"
              class="key-input"
              placeholder="sk-ant-..."
              autocomplete="off"
              spellcheck="false"
            />
            <button class="key-eye" id="keyEye" title="Voir/Cacher">👁️</button>
          </div>
          <div class="key-actions">
            <button class="key-save" id="keySave">Connecter</button>
            <button class="key-clear" id="keyClear">Effacer</button>
          </div>
          <div class="key-status" id="keyStatus"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- MENU LATÉRAL GAUCHE -->
  <aside class="sidebar" id="sidebar">
    <h2>💬 Discussions</h2>
    <ul class="discussion-list">
      <li class="discussion-item active">🗨️ Conversation 1</li>
      <li class="discussion-item">🗨️ Conversation 2</li>
      <li class="discussion-item">🗨️ Conversation 3</li>
      <li class="discussion-item">🗨️ Conversation 4</li>
      <li class="discussion-item">🗨️ Conversation 5</li>
    </ul>
    <button class="new-chat-btn">＋ Nouvelle discussion</button>
  </aside>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay"></div>

  <!-- ZONE PRINCIPALE -->
  <main class="main-content">
    <div class="chat-window" id="chatWindow">
      <div class="message bot">
        <span>Salut! Chu TI-LEX-AL. Clique sur 🔑 en haut à droite pour entrer ta clé API! 🍁</span>
      </div>
    </div>

    <div class="chat-bar">
      <div class="attach-wrapper" id="attachWrapper">
        <button class="attach-btn" id="attachBtn" disabled>＋</button>
        <div class="attach-menu" id="attachMenu">
          <label class="attach-item">📄 Fichier<input type="file" id="inputFichier" accept="*/*" hidden /></label>
          <label class="attach-item">🗜️ ZIP<input type="file" id="inputZip" accept=".zip,.rar,.7z,.tar,.gz" hidden /></label>
          <label class="attach-item">🖼️ Image<input type="file" id="inputImage" accept="image/*" hidden /></label>
        </div>
      </div>

      <textarea
        class="chat-input"
        id="chatInput"
        placeholder="Entre ta clé API 🔑 pour commencer..."
        rows="1"
        disabled
      ></textarea>
      <button class="send-btn" id="sendBtn" disabled>➤</button>
    </div>

    <div class="preview-bar" id="previewBar"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
