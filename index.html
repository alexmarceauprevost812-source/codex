<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texte-1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <span class="chat-title">💬 Chat</span>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area">

      <!-- Aperçu fichiers joints -->
      <div class="file-preview-bar" id="filePreviewBar"></div>

      <div class="input-row">

        <!-- Bouton + avec menu -->
        <div class="attach-wrapper">
          <button class="btn-plus" id="btnPlus" title="Joindre un fichier">+</button>
          <div class="attach-menu" id="attachMenu">
            <label class="attach-option">
              <input type="file" id="fileInput" multiple hidden />
              <span>📄 Fichier</span>
            </label>
            <label class="attach-option">
              <input type="file" id="zipInput" accept=".zip,.tar,.gz,.rar,.7z" multiple hidden />
              <span>🗜️ Archive ZIP</span>
            </label>
          </div>
        </div>

        <textarea id="userInput" placeholder="Écrire un message..." rows="1"></textarea>
        <button id="btnSend">Envoyer</button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
